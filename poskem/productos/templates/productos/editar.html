{% extends 'productos/base.html' %}

{% block title %}Editar Producto{% endblock %}

{% block content %}

<h2>Editar Producto</h2>

<form method="POST" class="mt-3">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" value="{{ producto.nombre }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea name="descripcion" class="form-control" required>{{ producto.descripcion }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Stock</label>
        <input type="number" name="stock" value="{{ producto.stock }}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Actualizar</button>
    <a href="{% url 'lista_productos' %}" class="btn btn-secondary">Cancelar</a>

</form>

{% endblock %}
